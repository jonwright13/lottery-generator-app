name: Fetch external data

on:
  workflow_dispatch: {}
  schedule:
    # Skip Monday — no UK draw produces results that land on a Monday
    # morning. Per-source day filtering further narrows each game.
    - cron: "0 6 * * 0,2-6"

permissions:
  contents: write

concurrency:
  group: fetch-external-data
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Fetch data
        # Manual runs bypass the per-source day filter; scheduled runs respect it.
        run: npm run fetch:data ${{ github.event_name == 'workflow_dispatch' && '-- --force' || '' }}

      - name: Commit and push if changed
        run: |
          if git status --porcelain public/data | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/data
            git commit -m "chore: update lottery data"
            git push
          else
            echo "No changes to commit."
          fi
